name: Build Rust builder images

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - docker-bake.hcl
      - .github/workflows/docker-images.yml
  schedule:
    # Weekly rebuild to pick up upstream php:* base image updates.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          targets: image
          push: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          set: |
            *.args.GIT_SHA=${{ github.sha }}
