name: Build Rust builder images

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - .github/workflows/docker-images.yml
  schedule:
    # Weekly rebuild to pick up upstream php:* base image updates.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3", "8.4", "8.5"]
        suffix: [cli, cli-alpine, zts, zts-alpine]
    name: "PHP ${{ matrix.php-version }} / ${{ matrix.suffix }}"
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 # v1.12.0
    with:
      output: image
      file: docker/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      build-args: |
        PHP_VERSION=${{ matrix.php-version }}
        BASE_SUFFIX=${{ matrix.suffix }}
      meta-images: ghcr.io/shyim/php-extension-builder-rust
      meta-tags: |
        type=raw,value=${{ matrix.php-version }}-${{ matrix.suffix }}
        type=raw,value=${{ matrix.php-version }}-${{ matrix.suffix }}-${{ github.sha }}
      push: ${{ (github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule')) || (github.event_name == 'workflow_dispatch' && inputs.push) }}
      sbom: true
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      registry-auths: |
        ghcr.io:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
